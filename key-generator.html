<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaQMS License Key Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 28px;
            font-weight: 900;
            color: #1e293b;
            letter-spacing: -0.05em;
        }
        
        .logo p {
            color: #64748b;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        select, input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            background: white;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .tier-info {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .tier-info h3 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
        }
        
        .tier-info .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .tier-info .detail {
            font-size: 13px;
        }
        
        .tier-info .label {
            color: #64748b;
            font-weight: 500;
        }
        
        .tier-info .value {
            color: #1e293b;
            font-weight: 700;
        }
        
        button {
            width: 100%;
            padding: 16px 24px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        button:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.5);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #f0fdf4;
            border: 2px solid #bbf7d0;
            border-radius: 12px;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result.success {
            background: #f0fdf4;
            border-color: #bbf7d0;
        }
        
        .result.error {
            background: #fef2f2;
            border-color: #fecaca;
        }
        
        .result-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        
        .result.success .result-label {
            color: #16a34a;
        }
        
        .result.error .result-label {
            color: #dc2626;
        }
        
        .result-key {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            word-break: break-all;
            background: white;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        
        .copy-btn {
            margin-top: 12px;
            padding: 10px 20px;
            background: #1e293b;
        }
        
        .machine-id-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .machine-id-section label {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .machine-id-section input[type="checkbox"] {
            width: auto;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🔑 Key Generator</h1>
            <p>PharmaQMS Enterprise License</p>
        </div>
        
        <div class="form-group">
            <label>License Type</label>
            <select id="tier">
                <option value="TRIAL">TRIAL - 14 Days (1 User)</option>
                <option value="DEMO" selected>DEMO - 30 Days (2 Users)</option>
                <option value="ENTERPRISE">ENTERPRISE - 365 Days (100 Users)</option>
                <option value="SITE">SITE - 730 Days (Unlimited)</option>
            </select>
        </div>
        
        <div class="tier-info" id="tierInfo">
            <h3>License Details</h3>
            <div class="details">
                <div class="detail">
                    <span class="label">Duration:</span>
                    <span class="value" id="duration">30 Days</span>
                </div>
                <div class="detail">
                    <span class="label">Users:</span>
                    <span class="value" id="users">2 Users</span>
                </div>
                <div class="detail">
                    <span class="label">Tier:</span>
                    <span class="value" id="tierName">DEMO</span>
                </div>
                <div class="detail">
                    <span class="label">Format:</span>
                    <span class="value">XXXX-XXXX-XXXX-XXXX-XXXX</span>
                </div>
            </div>
        </div>
        
        <div class="machine-id-section">
            <label>
                <input type="checkbox" id="bindMachine">
                Bind to Machine ID
            </label>
            <p style="font-size: 12px; color: #64748b; margin-top: 8px;">
                When enabled, key will only work on this computer
            </p>
        </div>
        
        <button onclick="generateKey()">Generate Key</button>
        
        <div class="result" id="result">
            <div class="result-label" id="resultLabel">Generated Key</div>
            <div class="result-key" id="resultKey"></div>
            <button class="copy-btn" onclick="copyKey()">Copy to Clipboard</button>
        </div>
        
        <div class="footer">
            PharmaQMS v2024.1 • 21 CFR Part 11 Compliant
        </div>
    </div>

    <script>
        // License configuration
        const LICENSE_CONFIGS = {
            TRIAL: { expiryDays: 14, maxUsers: 1 },
            DEMO: { expiryDays: 30, maxUsers: 2 },
            ENTERPRISE: { expiryDays: 365, maxUsers: 100 },
            SITE: { expiryDays: 730, maxUsers: -1 }
        };
        
        const KEY_PREFIXES = {
            TRIAL: 'TRL',
            DEMO: 'DEM',
            ENTERPRISE: 'ENT',
            SITE: 'SIT'
        };
        
        const SECRET_SALT = 'PQMS2024';
        const KEY_VERSION = '1.0';
        
        // Update tier info when selection changes
        document.getElementById('tier').addEventListener('change', updateTierInfo);
        
        function updateTierInfo() {
            const tier = document.getElementById('tier').value;
            const config = LICENSE_CONFIGS[tier];
            
            document.getElementById('duration').textContent = config.expiryDays + ' Days';
            document.getElementById('users').textContent = config.maxUsers === -1 ? 'Unlimited' : config.maxUsers + ' Users';
            document.getElementById('tierName').textContent = tier;
        }
        
        // Get machine ID from current device
        function getMachineId() {
            // First try to get from localStorage
            let machineId = localStorage.getItem('pqms_machine_id');
            if (!machineId) {
                // Generate new machine ID
                const factors = [
                    navigator.userAgent,
                    navigator.language,
                    navigator.platform,
                    screen.width.toString(),
                    screen.height.toString(),
                    screen.colorDepth.toString(),
                    new Date().getTimezoneOffset().toString()
                ];
                machineId = simpleHash(factors.join('|'));
                machineId = formatAsKey(machineId, 16);
                localStorage.setItem('pqms_machine_id', machineId);
            }
            return machineId;
        }
        
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padStart(8, '0').toUpperCase();
        }
        
        function formatAsKey(str, length) {
            const cleaned = str.replace(/[^A-F0-9]/gi, '').toUpperCase();
            let result = '';
            for (let i = 0; i < length && i < cleaned.length; i++) {
                if (i > 0 && i % 4 === 0) {
                    result += '-';
                }
                result += cleaned[i];
            }
            while (result.replace(/-/g, '').length < length) {
                result += Math.floor(Math.random() * 16).toString(16).toUpperCase();
            }
            return result;
        }
        
        // Date encoding
        function encodeExpiryDate(expiryDays) {
            const epochOffset = 19000;
            return (expiryDays + epochOffset).toString(16).toUpperCase().padStart(3, '0');
        }
        
        // Secure random
        function getSecureRandomBytes(length) {
            const chars = '0123456789ABCDEF';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars[Math.floor(Math.random() * 16)];
            }
            return result;
        }
        
        // Generate the license key
        function generateKey() {
            const tier = document.getElementById('tier').value;
            const bindMachine = document.getElementById('bindMachine').checked;
            const config = LICENSE_CONFIGS[tier];
            const prefix = KEY_PREFIXES[tier];
            
            // Calculate expiry date
            const today = Math.floor(Date.now() / (1000 * 60 * 60 * 24));
            const expiryDays = today + config.expiryDays;
            
            // Encode components
            const tierCode = prefix.padEnd(4, '0').substring(0, 4);
            const versionCode = KEY_VERSION.replace('.', '');
            const expiryCode = encodeExpiryDate(expiryDays);
            const randomCode = getSecureRandomBytes(4);
            
            // Get machine ID if binding
            const machineId = bindMachine ? getMachineId().replace(/-/g, '').substring(0, 16) : '';
            
            // Create signature
            const payload = `${tierCode}-${versionCode}-${expiryDays}-${randomCode}${machineId}`;
            const signature = simpleHash(payload + SECRET_SALT);
            
            // Format as license key: XXXX-XXXX-XXXX-XXXX-XXXX
            const key = [
                tierCode,
                versionCode + expiryCode.substring(0, 2),
                expiryCode.substring(2) + randomCode.substring(0, 2),
                randomCode.substring(2) + signature.substring(0, 2),
                signature.substring(2)
            ].join('-');
            
            // Show result
            const resultDiv = document.getElementById('result');
            const resultKey = document.getElementById('resultKey');
            const resultLabel = document.getElementById('resultLabel');
            
            resultKey.textContent = key;
            resultLabel.textContent = bindMachine ? 'Machine-Bound Key Generated' : 'Key Generated';
            resultDiv.className = 'result show success';
        }
        
        // Copy to clipboard
        function copyKey() {
            const key = document.getElementById('resultKey').textContent;
            navigator.clipboard.writeText(key).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = 'Copy to Clipboard';
                }, 2000);
            });
        }
        
        // Initialize
        updateTierInfo();
    </script>
</body>
</html>
